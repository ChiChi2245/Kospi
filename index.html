<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KOSPI Market Map</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="page">
    <section id="indexStrip" class="index-strip"></section>

    <header class="header">
      <div>
        <div class="eyebrow">KRX CSV IMPORTED · KOSPI TOP 200</div>
        <h1>KOSPI Market Cap Top 200 Heatmap</h1>
        <p>업로드한 CSV 기준 · 시가총액 비례 박스 · 등락률 색상 표시</p>
      </div>
      <div id="summary" class="summary"></div>
    </header>

    <nav class="toolbar">
      <div class="search-box">
        <span>⌕</span>
        <input id="searchInput" type="text" placeholder="종목명/코드 검색: 삼성전자, 005930..." />
      </div>
      <div class="legend">
        <span id="dataStatus">CSV 데이터 표시 중</span>
        <span><i class="red"></i> 하락</span>
        <span><i class="flat"></i> 보합</span>
        <span><i class="green"></i> 상승</span>
        <button id="resetBtn">전체 보기</button>
        <button id="kisBtn">한투 API 테스트</button>
      </div>
    </nav>

    <main id="heatmap" class="heatmap"></main>
    <div id="tooltip" class="tooltip hidden"></div>

    <footer class="footer">
      <span id="topFive"></span>
      <span>다음 단계: 백엔드 /api/kis/quotes 연결 후 현재가와 등락률 덮어쓰기</span>
    </footer>
  </div>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
